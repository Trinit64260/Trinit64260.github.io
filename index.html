<!DOCTYPE html>
<html>
<head>
  <title>Number Guesser</title>
</head>
<body>
  <h1>Number Guesser</h1>
  <p>Think of a number between 1 and 1000, and I'll try to guess it within 12 questions.</p>

  <script>
    var min = 1, max = 1000, guess, response;

    for (var i = 1; i <= 12; i++) {
      guess = Math.floor((min + max) / 2);
      response = prompt("Is your number higher than " + guess + "? (y/n)");

      if (response === "y") {
        min = guess + 1;
      } else if (response === "n") {
        max = guess - 1;
      }

      if (min === max) {
        alert("Your number is " + min);
        break;
      }
    }

    if (min !== max) {
      alert("Sorry, I was not able to guess your number within 12 questions.");
    }
  </script>
</body>
</html>
